<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCNA Certificate - Derrick Muriithi Mwangi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb4d);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .certificate {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 40px 35px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .seal {
            font-size: 48px;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 28px;
            color: #1e3c72;
            border-bottom: 3px solid #fdbb4d;
            display: inline-block;
            padding-bottom: 8px;
            margin-bottom: 25px;
        }
        .info-box {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 25px;
            margin: 20px 0;
            text-align: left;
            border-left: 6px solid #fdbb4d;
        }
        .info-row {
            margin: 15px 0;
            font-size: 18px;
        }
        .label {
            font-weight: bold;
            color: #b21f1f;
            display: inline-block;
            width: 150px;
        }
        .value {
            color: #1a2a6c;
            font-weight: 500;
        }
        .status-valid {
            background: #d4edda;
            color: #155724;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: bold;
            display: inline-block;
        }
        .message {
            background: #e8f0fe;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            font-weight: bold;
            color: #004080;
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #6c757d;
        }
        @media (max-width: 480px) {
            .certificate { padding: 25px 20px; }
            .label { width: 120px; font-size: 14px; }
            .info-row { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="certificate">
        <div class="seal">🎓 ⚙️</div>
        <h1>CERTIFICATE OF COMPLETION</h1>
        
        <div class="info-box">
            <div class="info-row">
                <span class="label">Certificate:</span>
                <span class="value">00B80-1806</span>
            </div>
            <div class="info-row">
                <span class="label">Status:</span>
                <span class="status-valid">✅ VALID</span>
            </div>
            <div class="info-row">
                <span class="label">Candidate Name:</span>
                <span class="value">Derrick Muriithi Mwangi</span>
            </div>
        </div>
        
        <div class="message">
            🏆 Derrick has successfully completed the <strong>CCNA 200-301 Training Course</strong><br>
            & <strong>Passed All Exams</strong> 🏆
        </div>
        
        <div class="footer">
            Issued: Cisco Networking Academy • Valid ID: 00B80-1806
        </div>
    </div>
</body>
</html>
